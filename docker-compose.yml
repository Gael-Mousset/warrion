version: "3.8"

services:
  mongo:
    container_name: mongo-warrion
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always
    networks:
      - warrion_network
    healthcheck:
      # mongosh est toujours présent dans l'image mongo:7
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  back:
    container_name: back-warrion
    build:
      context: ../Back_Warrion/
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/warrion
      - FRONTEND_URL=http://localhost:8088
      # - FRONTEND_URL=http://51.77.137.168:8088
    restart: always
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - warrion_network
      # - nginx-proxy-manager_default
    healthcheck:
      # Node.js est toujours disponible dans l'image — pas besoin de curl/wget
      # NestJS répond 404 sur "/" (préfixe /api), ce qui est < 500 → healthy
      test:
        - "CMD"
        - "node"
        - "-e"
        - "const h=require('http');const req=h.get('http://localhost:3000/',res=>{process.exit(res.statusCode<500?0:1)});req.on('error',()=>process.exit(1));req.setTimeout(3000,()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      # start_period = temps avant que les échecs comptent
      # NestJS + connexion MongoDB peut prendre 25-35s au démarrage
      start_period: 45s

  front:
    container_name: front-warrion
    build:
      context: .
      dockerfile: dockerfile
      args:
        - VITE_API_LOCAL_URL=http://localhost:3000
        # - VITE_API_LOCAL_URL=http://51.77.137.168:3000
    ports:
      - "8088:80"
    restart: always
    depends_on:
      back:
        condition: service_healthy
    networks:
      - warrion_network
      # - nginx-proxy-manager_default
    healthcheck:
      # wget est inclus dans nginx:alpine via busybox
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  mongo_data:

networks:
  warrion_network:
  # nginx-proxy-manager_default:
  #   external: true
